display_information:
  name: ${NAME}
  description: ${DESCRIPTION}
features:
  bot_user:
    display_name: ${DISPLAY_NAME}
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  shortcuts:
    - name: Home
      type: global
      callback_id: anima.home
      description: Open this agent's Anima home.
    - name: Hand to agent
      type: message
      callback_id: anima.hand_to_agent
      description: Hand this message to the agent as a task.
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - bookmarks:read
      - bookmarks:write
      - chat:write
      - chat:write.customize
      - chat:write.public
      - channels:history
      - channels:join
      - channels:manage
      - channels:read
      - channels:write.invites
      - channels:write.topic
      - commands
      - emoji:read
      - files:read
      - files:write
      - groups:history
      - groups:read
      - groups:write
      - groups:write.invites
      - groups:write.topic
      - im:history
      - im:read
      - im:write
      - links:read
      - links:write
      - mpim:history
      - mpim:read
      - mpim:write
      - pins:read
      - pins:write
      - reactions:read
      - reactions:write
      - team:read
      - usergroups:read
      - usergroups:write
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - channel_archive
      - channel_created
      - channel_deleted
      - channel_rename
      - channel_unarchive
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - team_join
      - user_change
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
